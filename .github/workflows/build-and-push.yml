# .github/workflows/docker-alpine.yml
#
# Builds and publishes Alpine and static Horust image variants to GHCR.
# The existing ci.yml is left completely unchanged.
#
# Published tags:
#   ghcr.io/yamatt/horust:v0.2.0-alpine
#   ghcr.io/yamatt/horust:latest-alpine
#   ghcr.io/yamatt/horust:v0.2.0-static
#   ghcr.io/yamatt/horust:latest-static

name: Docker Alpine

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build ${{ matrix.variant }} (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
 
    strategy:
      matrix:
        include:
          - variant: alpine
            arch: amd64
            dockerfile: Dockerfile.amd64
            platform: linux/amd64
            runner: ubuntu-latest
            rustflags: ''
            base: alpine:3.21
          - variant: alpine
            arch: arm64
            dockerfile: Dockerfile.arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            rustflags: ''
            base: alpine:3.21
          - variant: static
            arch: amd64
            dockerfile: Dockerfile.amd64
            platform: linux/amd64
            runner: ubuntu-latest
            rustflags: '-C target-feature=+crt-static'
            base: gcr.io/distroless/static:latest
          - variant: static
            arch: arm64
            dockerfile: Dockerfile.arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            rustflags: '-C target-feature=+crt-static'
            base: gcr.io/distroless/static:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            RUSTFLAGS=${{ matrix.rustflags }}
            BASE=${{ matrix.base }}
          tags: ghcr.io/yamatt/horust:${{ github.ref_name }}-${{ matrix.variant }}-${{ matrix.arch }}
          cache-from: type=registry,ref=ghcr.io/yamatt/horust:buildcache-${{ matrix.variant }}-${{ matrix.arch }}
          cache-to: type=registry,ref=ghcr.io/yamatt/horust:buildcache-${{ matrix.variant }}-${{ matrix.arch }},mode=max

  merge:
    name: Merge ${{ matrix.variant }} manifest
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        variant: [alpine, static]

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create and push multi-arch manifest
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/yamatt/horust:${{ github.ref_name }}-${{ matrix.variant }} \
            --tag ghcr.io/yamatt/horust:latest-${{ matrix.variant }} \
            ghcr.io/yamatt/horust:${{ github.ref_name }}-${{ matrix.variant }}-amd64 \
            ghcr.io/yamatt/horust:${{ github.ref_name }}-${{ matrix.variant }}-arm64